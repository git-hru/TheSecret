<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Wishes — The Secret</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
</head>
<body class="page-ordered">

  <div class="particles" id="particles"></div>

  <header class="site-header">
    <nav class="nav">
      <a href="index.html" class="nav-logo">✦ The Secret</a>
      <div class="nav-links">
        <a href="wishlist.html">My Wishlist</a>
        <a href="ordered.html" class="active">My Wishes</a>
      </div>
    </nav>
  </header>

  <main class="ordered-main">
    <div class="ordered-hero">
      <div class="ordered-glow-ring"></div>
      <p class="eyebrow">It Is Done</p>
      <h1 class="headline">Here Are the Wishes<br/>You Have Wished</h1>
      <p class="ordered-decree">
        The Universe is already making your wishes real and yours.<br/>
        <strong>These wishes are already yours.</strong>
      </p>
    </div>

    <!-- Empty state -->
    <div class="empty-state" id="empty-state" style="display:none">
      <div class="empty-icon">✦</div>
      <p>You haven't ordered any wishes yet.</p>
      <a href="index.html" class="btn-primary" style="display:inline-block;margin-top:1.5rem;">Begin Asking</a>
    </div>

    <div class="wishes-scroll" id="wishes-list"></div>
  </main>

  <script src="js/app.js"></script>
  <script>
    generateParticles();
    renderOrderedWishes();
  </script>
</body>
</html>
